<svg xmlns="http://www.w3.org/2000/svg" width="820" height="540" viewBox="0 0 820 540" font-family="Segoe UI, Roboto, system-ui, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0b2545" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="820" height="540" fill="#eef2f8"/>

  <!-- Okno aplikacji -->
  <g filter="url(#shadow)">
    <rect x="40" y="28" width="740" height="484" rx="18" fill="#f3f6fb"/>
  </g>

  <!-- Nagłówek -->
  <path d="M40 46 a18 18 0 0 1 18 -18 h704 a18 18 0 0 1 18 18 v46 h-740 z" fill="#0b2545"/>
  <rect x="60" y="44" width="38" height="38" rx="10" fill="#ffffff20"/>
  <path d="M67 80 h24 M69 80 V69 l10 -7 l10 7 V80 M75 80 v-6 h8 v6" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>
  <text x="110" y="60" fill="#ffffff" font-size="16" font-weight="700">Bank</text>
  <text x="110" y="78" fill="#ffffffba" font-size="12">Asystent klienta</text>

  <!-- Pasek narzędzi: licznik tokenów + przyciski -->
  <rect x="584" y="48" width="96" height="24" rx="12" fill="#ffffff1a" stroke="#ffffff2e"/>
  <text x="632" y="64" fill="#ffffffd0" font-size="11" font-weight="600" text-anchor="middle">~1 248 tok</text>
  <circle cx="707" cy="60" r="15" fill="#ffffff1a"/>
  <path d="M711 53 a7 7 0 1 0 4 13 8 8 0 0 1 -4 -13 z" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linejoin="round"/>
  <circle cx="747" cy="60" r="15" fill="#ffffff1a"/>
  <circle cx="747" cy="60" r="3.4" fill="none" stroke="#ffffff" stroke-width="1.7"/>
  <path d="M747 51 v-3 M747 69 v3 M738 60 h-3 M756 60 h3 M741 54 l-2 -2 M753 66 l2 2 M753 54 l2 -2 M741 66 l-2 2" fill="none" stroke="#ffffff" stroke-width="1.7" stroke-linecap="round"/>

  <!-- Powitanie asystenta -->
  <g>
    <rect x="60" y="108" width="404" height="66" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="78" y="134" fill="#0f172a" font-size="12.5">Dzień dobry. Jestem wirtualnym asystentem banku.</text>
    <text x="78" y="154" fill="#0f172a" font-size="12.5">W czym mogę Panu/Pani pomóc?</text>
    <text x="78" y="190" fill="#5b6b82" font-size="10.5">Asystent · 09:14</text>
  </g>

  <!-- Wiadomość użytkownika -->
  <g>
    <rect x="460" y="206" width="300" height="38" rx="16" fill="#0b2545"/>
    <text x="744" y="230" fill="#ffffff" font-size="12.5" text-anchor="end">Jak otworzyć konto osobiste?</text>
    <text x="744" y="256" fill="#5b6b82" font-size="10.5" text-anchor="end">Ty · 09:14</text>
  </g>

  <!-- Odpowiedź asystenta ze streamingiem i oceną -->
  <g>
    <rect x="60" y="272" width="470" height="84" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="78" y="300" fill="#0f172a" font-size="12.5">Konto otworzysz w pełni online w około 10 minut —</text>
    <text x="78" y="320" fill="#0f172a" font-size="12.5">wystarczy wniosek i potwierdzenie tożsamości</text>
    <text x="78" y="340" fill="#0f172a" font-size="12.5">przelewem weryfikacyjnym lub w aplikacji mObywatel.<tspan fill="#2563eb" font-weight="700">▋</tspan></text>
  </g>
  <!-- Oceny: przydatna / nieprzydatna -->
  <rect x="78" y="372" width="32" height="24" rx="8" fill="#ecfdf3" stroke="#16794c"/>
  <path d="M86 388 v-6 m4 6 l3 -1 1 -4 h-3 l1 -3 -3 2 v6 z" fill="none" stroke="#16794c" stroke-width="1.4" stroke-linejoin="round"/>
  <rect x="116" y="372" width="32" height="24" rx="8" fill="#ffffff" stroke="#e2e8f0"/>
  <path d="M124 380 v6 m4 -6 l3 1 1 4 h-3 l1 3 -3 -2 v-6 z" fill="none" stroke="#5b6b82" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Pole wpisywania -->
  <g>
    <rect x="60" y="452" width="700" height="46" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <text x="80" y="480" fill="#5b6b82" font-size="12.5">Napisz wiadomość… (np. Jak zrobić przelew?)</text>
    <rect x="706" y="458" width="38" height="34" rx="11" fill="#2563eb"/>
    <path d="M717 476 l16 -6 -6 16 -3 -7 -7 -3 z" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
  </g>
</svg>
