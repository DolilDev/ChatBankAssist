<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://generativelanguage.googleapis.com https://api.openai.com https://api.anthropic.com; object-src 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="description" content="Strona demonstracyjna asystenta Banku — szybki test z kluczem API." />
  <meta name="color-scheme" content="light dark" />
  <link rel="icon" href="favicon.ico" sizes="32x32" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>Demo — Asystent Banku</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("bank_theme");
        if (!t) t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <span class="brand__logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 21h18"/><path d="M5 21V10l7-5 7 5v11"/><path d="M9 21v-6h6v6"/></svg>
        </span>
        <div class="brand__text">
          <span class="brand__name">Bank</span>
          <span class="brand__sub">Demo / szybki test</span>
        </div>
      </div>
      <div class="toolbar">
        <a class="tool-link" href="index.html">← Pełna aplikacja</a>
        <button type="button" class="tool-btn" id="theme-toggle" aria-label="Przełącz motyw" title="Tryb ciemny / jasny">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <section class="demo-panel">
      <p class="demo-panel__lead">
        Wklej klucz API, aby przetestować tryb AI, albo zostaw puste pole — bot odpowie z bazy wiedzy.
        Klucz jest trzymany tylko w <strong>sessionStorage</strong> tej karty.
      </p>
      <div class="demo-panel__row">
        <label class="field">
          <span class="field__label">Dostawca</span>
          <select id="demo-provider" class="field__control">
            <option value="">— tryb lokalny (bez API) —</option>
            <option value="gemini">Google Gemini — zalecany, darmowy</option>
            <option value="claude">Anthropic Claude</option>
            <option value="openai">OpenAI</option>
          </select>
        </label>
        <label class="field">
          <span class="field__label">Klucz API</span>
          <input id="demo-key" class="field__control" type="password" autocomplete="off" spellcheck="false" placeholder="Wklej klucz (opcjonalnie)" />
        </label>
      </div>
      <p id="demo-status" class="setting__status" role="status"></p>
    </section>

    <main class="chat">
      <div class="chat__log" id="demo-log" role="log" aria-live="polite" aria-label="Historia rozmowy"></div>
    </main>

    <footer class="composer">
      <form class="composer__form" id="demo-form" autocomplete="off">
        <label class="visually-hidden" for="demo-input">Twoja wiadomość</label>
        <textarea id="demo-input" class="composer__input" rows="1" placeholder="Napisz wiadomość…" aria-label="Twoja wiadomość"></textarea>
        <button type="submit" id="demo-send" class="composer__send" aria-label="Wyślij">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2 11 13"/><path d="M22 2 15 22l-4-9-9-4 20-7z"/></svg>
        </button>
      </form>
    </footer>
  </div>

  <script src="app.js" defer></script>
  <script>
    // Lekki harness demo — korzysta z rdzenia window.BankBot zdefiniowanego w app.js.
    document.addEventListener("DOMContentLoaded", function () {
      var B = window.BankBot;
      if (!B) return;
      var log = document.getElementById("demo-log");
      var form = document.getElementById("demo-form");
      var input = document.getElementById("demo-input");
      var send = document.getElementById("demo-send");
      var providerSel = document.getElementById("demo-provider");
      var keyInput = document.getElementById("demo-key");
      var statusEl = document.getElementById("demo-status");
      var busy = false;
      var messages = [];

      try {
        providerSel.value = sessionStorage.getItem(B.STORAGE.provider) || "";
        keyInput.value = sessionStorage.getItem(B.STORAGE.key) || "";
      } catch (e) {}

      function persist() {
        try {
          if (providerSel.value && keyInput.value.trim()) {
            sessionStorage.setItem(B.STORAGE.provider, providerSel.value);
            sessionStorage.setItem(B.STORAGE.key, keyInput.value.trim());
          } else {
            sessionStorage.removeItem(B.STORAGE.provider);
            sessionStorage.removeItem(B.STORAGE.key);
          }
        } catch (e) {}
      }

      function reflectStatus() {
        var p = providerSel.value;
        if (!p) {
          statusEl.textContent = "Tryb lokalny (baza wiedzy) — bez klucza API.";
          statusEl.className = "setting__status";
          return;
        }
        var warn = p === "openai" || p === "claude";
        var label = B.PROVIDERS[p] ? B.PROVIDERS[p].label : p;
        statusEl.textContent = warn
          ? label + " — uwaga: API zwykle blokowane w przeglądarce (CORS). Zalecany Gemini."
          : label + " — gotowe do testu.";
        statusEl.className = "setting__status " + (warn ? "setting__status--err" : "setting__status--ok");
      }

      providerSel.addEventListener("change", function () { persist(); reflectStatus(); });
      keyInput.addEventListener("change", persist);
      reflectStatus();

      function bubble(role, text) {
        var wrap = document.createElement("div");
        wrap.className = "message message--" + role;
        var b = document.createElement("div");
        b.className = "bubble";
        b.textContent = text || "";
        wrap.appendChild(b);
        log.appendChild(wrap);
        log.scrollTop = log.scrollHeight;
        return b;
      }

      function streamWords(b, text) {
        return new Promise(function (res) {
          var toks = String(text).split(/(\s+)/);
          var i = 0;
          b.classList.add("bubble--streaming");
          (function tick() {
            if (i >= toks.length) { b.classList.remove("bubble--streaming"); res(); return; }
            b.textContent += toks[i++];
            log.scrollTop = log.scrollHeight;
            setTimeout(tick, 24 + Math.random() * 40);
          })();
        });
      }

      function setBusy(v) { busy = v; send.disabled = v; input.disabled = v; }

      form.addEventListener("submit", async function (e) {
        e.preventDefault();
        if (busy) return;
        var text = input.value.trim();
        if (!text) return;
        bubble("user", text);
        messages.push({ role: "user", text: text });
        input.value = "";
        setBusy(true);

        var lang = B.detectLanguage(text);
        var provider = providerSel.value;
        var key = keyInput.value.trim();
        try {
          if (provider && key) {
            var b = null;
            await B.streamFromAPI(provider, key, messages.slice(), {
              system: B.buildSystemPrompt(lang),
              onToken: function (tk) {
                if (!b) b = bubble("bot", "");
                b.textContent += tk;
                log.scrollTop = log.scrollHeight;
              },
            });
            if (!b) b = bubble("bot", "(pusta odpowiedź z API)");
            messages.push({ role: "bot", text: b.textContent });
          } else {
            var m = B.findAnswer(text);
            var ans = m ? m.entry.a[lang] || m.entry.a.pl : B.escalationText(lang);
            var bb = bubble("bot", "");
            await streamWords(bb, ans);
            messages.push({ role: "bot", text: ans });
          }
        } catch (err) {
          var eb = bubble("bot", "");
          await streamWords(eb, B.apiErrorText(provider, err, lang));
        } finally {
          setBusy(false);
          input.focus();
        }
      });

      input.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); form.requestSubmit(); }
      });

      B.loadKnowledgeBase().then(function () {
        bubble("bot", "Demo gotowe. Zadaj pytanie — z kluczem API użyję wybranego modelu, bez klucza odpowiem z bazy wiedzy.");
        input.focus();
      });
    });
  </script>
</body>
</html>
