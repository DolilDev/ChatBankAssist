<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'" />
  <meta name="description" content="Asystent obsługi klienta Banku — czat z bazą wiedzy, działa w całości w przeglądarce." />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0b2545" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ChatBankAssist" />
  <meta property="og:title" content="Bank — Asystent obsługi klienta" />
  <meta property="og:description" content="Chatbot obsługi klienta banku działający w całości w przeglądarce — baza wiedzy FAQ i opcjonalny model AI." />
  <meta property="og:url" content="https://dolildev.github.io/ChatBankAssist/" />
  <meta property="og:image" content="https://dolildev.github.io/ChatBankAssist/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Bank — Asystent obsługi klienta" />
  <meta name="twitter:description" content="Chatbot obsługi klienta banku działający w całości w przeglądarce — baza wiedzy FAQ i opcjonalny model AI." />
  <meta name="twitter:image" content="https://dolildev.github.io/ChatBankAssist/og-image.png" />
  <link rel="icon" href="favicon.ico" sizes="32x32" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <title>Bank — Asystent klienta</title>
  <script>
    // Ustaw motyw przed renderowaniem, aby uniknąć mignięcia.
    (function () {
      try {
        var t = localStorage.getItem("bank_theme");
        if (!t) t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <span class="brand__logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21h18" /><path d="M5 21V10l7-5 7 5v11" />
            <path d="M9 21v-6h6v6" />
          </svg>
        </span>
        <div class="brand__text">
          <span class="brand__name">Bank</span>
          <span class="brand__sub">Asystent klienta</span>
        </div>
      </div>
      <div class="toolbar" id="toolbar">
        <span class="token-counter" id="token-counter" title="Szacunkowa liczba tokenów zużytych w tej rozmowie" aria-live="polite" hidden>~0 tokens</span>
        <button type="button" class="tool-btn" id="summary-btn" aria-label="Podsumuj rozmowę" title="Podsumuj rozmowę">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6h13M8 12h13M8 18h13"/><path d="M3 6h.01M3 12h.01M3 18h.01"/></svg>
        </button>
        <button type="button" class="tool-btn" id="newchat-btn" aria-label="Nowa rozmowa" title="Nowa rozmowa">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><path d="M12 8v6M9 11h6"/></svg>
        </button>
        <button type="button" class="tool-btn" id="export-btn" aria-label="Eksportuj rozmowę" title="Eksportuj rozmowę do pliku">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
        </button>
        <button type="button" class="tool-btn" id="theme-toggle" aria-label="Przełącz motyw" title="Tryb ciemny / jasny">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button type="button" class="tool-btn" id="mode-btn" aria-label="Tryb czatu" title="Tryb czatu (AI / lokalny)">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
          </svg>
        </button>
      </div>
    </header>

    <main class="chat">
      <div class="chat__log" id="chat-log" role="log" aria-live="polite" aria-label="Historia rozmowy"></div>
    </main>

    <footer class="composer">
      <div class="suggestions" id="suggestions" aria-label="Przykładowe pytania" hidden></div>
      <form class="composer__form" id="composer" autocomplete="off">
        <label class="visually-hidden" for="chat-input">Twoja wiadomość</label>
        <textarea
          id="chat-input"
          class="composer__input"
          name="message"
          rows="1"
          placeholder="Napisz wiadomość… (np. Jak otworzyć konto?)"
          aria-label="Twoja wiadomość"
        ></textarea>
        <button type="submit" id="send-btn" class="composer__send" aria-label="Wyślij wiadomość">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2 11 13" /><path d="M22 2 15 22l-4-9-9-4 20-7z" />
          </svg>
        </button>
      </form>
      <p class="composer__hint">Bot działa lokalnie na bazie wiedzy. Tryb API (Gemini/Claude/OpenAI) jest opcjonalny.</p>
    </footer>
  </div>

  <!-- Wybór trybu rozmowy (pierwsze uruchomienie) -->
  <div class="modal" id="mode-modal" hidden>
    <div class="modal__backdrop" data-close="mode-modal"></div>
    <div class="modal__dialog" role="dialog" aria-modal="true" aria-labelledby="mode-title" tabindex="-1">
      <header class="modal__head">
        <h2 id="mode-title">Wybierz tryb rozmowy</h2>
        <button type="button" class="modal__close" data-close="mode-modal" aria-label="Zamknij">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
      </header>
      <div class="modal__body">
        <p class="welcome__lead">
          Asystent może odpowiadać na dwa sposoby. Wybór zapamiętamy na czas tej sesji —
          możesz go zmienić ikoną w prawym górnym rogu.
        </p>
        <div class="mode-options">
          <button type="button" class="mode-card" id="mode-ai">
            <span class="mode-card__title">Tryb AI (Groq)</span>
            <span class="mode-card__desc">Odpowiedzi generuje model LLM (Llama 3.3 70B) przez bezpieczny backend. Bardziej naturalne, swobodne odpowiedzi.</span>
          </button>
          <button type="button" class="mode-card" id="mode-local">
            <span class="mode-card__title">Tryb lokalny</span>
            <span class="mode-card__desc">Szybkie odpowiedzi z bazy wiedzy FAQ, w całości w przeglądarce — bez wysyłania zapytań na serwer.</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js" defer></script>
</body>
</html>
