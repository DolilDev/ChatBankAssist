<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <!-- Brak meta CSP celowo: strona osadza zewnętrzny czat Voiceflow w iframe i nie
       obsługuje kluczy API ani danych użytkownika, więc nie wymaga restrykcyjnego CSP
       jak index.html/demo.html. -->
  <meta name="description" content="Wersja asystenta Banku zbudowana w Voiceflow — platformie no-code do budowy chatbotów produkcyjnych." />
  <meta name="color-scheme" content="light dark" />
  <meta name="theme-color" content="#0b2545" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="ChatBankAssist" />
  <meta property="og:title" content="Asystent Banku — wersja Voiceflow" />
  <meta property="og:description" content="Ten sam asystent obsługi klienta zbudowany na platformie no-code Voiceflow." />
  <meta property="og:url" content="https://dolildev.github.io/ChatBankAssist/voiceflow.html" />
  <meta property="og:image" content="https://dolildev.github.io/ChatBankAssist/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Asystent Banku — wersja Voiceflow" />
  <meta name="twitter:description" content="Ten sam asystent obsługi klienta zbudowany na platformie no-code Voiceflow." />
  <meta name="twitter:image" content="https://dolildev.github.io/ChatBankAssist/og-image.png" />
  <link rel="icon" href="favicon.ico" sizes="32x32" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <title>Bank — Asystent (Voiceflow)</title>
  <script>
    // Ustaw motyw przed renderowaniem, aby uniknąć mignięcia.
    (function () {
      try {
        var t = localStorage.getItem("bank_theme");
        if (!t) t = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <span class="brand__logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 21h18" /><path d="M5 21V10l7-5 7 5v11" />
            <path d="M9 21v-6h6v6" />
          </svg>
        </span>
        <div class="brand__text">
          <span class="brand__name">Bank</span>
          <span class="brand__sub">Asystent · Voiceflow</span>
        </div>
      </div>
      <div class="toolbar">
        <a class="tool-link" href="index.html">← Powrót do czatu</a>
        <button type="button" class="tool-btn" id="theme-toggle" aria-label="Przełącz motyw" title="Tryb ciemny / jasny">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
      </div>
    </header>

    <main class="vf-main">
      <div class="vf-content">
        <p class="vf-lead">
          Ta sama wersja asystenta zbudowana w Voiceflow — platformie no-code do budowania
          chatbotów produkcyjnych.
        </p>

        <div class="vf-actions">
          <button type="button" id="open-chat-btn" class="btn btn--primary">Otwórz asystenta</button>
        </div>

        <p class="vf-fallback">
          Jeśli okno czatu się nie wyświetla,
          <a href="https://creator.voiceflow.com/share/6a1be20d7b492825fac4e318/environment/main/draft" target="_blank" rel="noopener">otwórz asystenta w nowej karcie</a>.
        </p>
      </div>
    </main>
  </div>

  <!-- Pływające okno asystenta (iframe w prawym dolnym rogu) -->
  <div class="vf-iframe-container" id="vf-container">
    <iframe
      src="https://creator.voiceflow.com/share/6a1be20d7b492825fac4e318/environment/main/draft"
      title="Czat Voiceflow — asystent Banku"
      width="100%"
      height="100%"
      style="border:none;"
      allow="microphone">
    </iframe>
  </div>

  <!-- Pokaż/ukryj pływające okno asystenta -->
  <script>
    document.getElementById('open-chat-btn').addEventListener('click', function() {
      document.querySelector('.vf-iframe-container').classList.toggle('open');
    });

    // Na start ukryte, automatyczne otwarcie po 500 ms.
    setTimeout(function() {
      document.querySelector('.vf-iframe-container').classList.add('open');
    }, 500);
  </script>

  <!-- Przełącznik motywu (samodzielny, spójny z resztą projektu) -->
  <script>
    (function () {
      var KEY = "bank_theme";
      var MOON = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      var SUN = '<svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>';
      var btn = document.getElementById("theme-toggle");
      function apply(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        if (btn) {
          var dark = theme === "dark";
          btn.innerHTML = dark ? SUN : MOON;
          btn.setAttribute("aria-label", dark ? "Włącz tryb jasny" : "Włącz tryb ciemny");
          btn.title = dark ? "Tryb jasny" : "Tryb ciemny";
        }
      }
      apply(document.documentElement.getAttribute("data-theme") || "light");
      if (btn) {
        btn.addEventListener("click", function () {
          var next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
          apply(next);
          try { localStorage.setItem(KEY, next); } catch (e) {}
        });
      }
    })();
  </script>
</body>
</html>
