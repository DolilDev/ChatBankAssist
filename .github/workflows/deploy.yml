name: Deploy to GitHub Pages

# Automatyczny deployment na GitHub Pages przy każdym pushu do main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Uprawnienia wymagane przez GitHub Pages (OIDC).
permissions:
  contents: read
  pages: write
  id-token: write

# Tylko jeden deployment naraz; nowsze pushe anulują starsze.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare site (dist/)
        run: |
          mkdir -p dist
          cp index.html demo.html style.css app.js knowledge_base.json dist/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
