name: Deploy to GitHub Pages

# Automatyczny deployment na GitHub Pages przy każdym pushu do main.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Uprawnienia wymagane przez GitHub Pages (OIDC).
permissions:
  contents: read
  pages: write
  id-token: write

# Tylko jeden deployment naraz; nowsze pushe anulują starsze.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate knowledge_base.json
        run: |
          echo "Sprawdzam poprawność składni JSON…"
          jq empty knowledge_base.json
          count=$(jq '.entries | length' knowledge_base.json)
          echo "Liczba wpisów: $count"
          if [ "$count" -lt 20 ]; then
            echo "::error::Za mało wpisów w bazie wiedzy ($count < 20)"; exit 1
          fi
          invalid=$(jq '[.entries[] | select((.id and .category and (.keywords|type=="array") and .q.pl and .a.pl) | not)] | length' knowledge_base.json)
          if [ "$invalid" -ne 0 ]; then
            echo "::error::$invalid wpis(ów) bez wymaganych pól (id, category, keywords, q.pl, a.pl)"; exit 1
          fi
          echo "Baza wiedzy poprawna ✔"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run unit tests
        run: node --test

      - name: Prepare site (dist/)
        run: |
          mkdir -p dist
          cp index.html demo.html voiceflow.html knowledge_base.json dist/

      - name: Minify CSS and JS
        run: |
          npx --yes -p terser@5 terser app.js --compress --mangle --output dist/app.js
          npx --yes -p csso-cli@5 csso style.css --output dist/style.css
          echo "Rozmiary źródłowe vs zminifikowane:"
          ls -l app.js dist/app.js style.css dist/style.css

      - name: Generate sitemap.xml and robots.txt
        run: |
          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          BASE="https://${OWNER,,}.github.io/${REPO}"
          DATE="$(date -u +%Y-%m-%d)"
          {
            echo '<?xml version="1.0" encoding="UTF-8"?>'
            echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">'
            echo "  <url><loc>${BASE}/</loc><lastmod>${DATE}</lastmod><changefreq>weekly</changefreq><priority>1.0</priority></url>"
            echo "  <url><loc>${BASE}/demo.html</loc><lastmod>${DATE}</lastmod><changefreq>monthly</changefreq><priority>0.7</priority></url>"
            echo "  <url><loc>${BASE}/voiceflow.html</loc><lastmod>${DATE}</lastmod><changefreq>monthly</changefreq><priority>0.6</priority></url>"
            echo '</urlset>'
          } > dist/sitemap.xml
          {
            echo 'User-agent: *'
            echo 'Allow: /'
            echo "Sitemap: ${BASE}/sitemap.xml"
          } > dist/robots.txt
          echo "Wygenerowano sitemap.xml:"
          cat dist/sitemap.xml

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
